name: Stats

on:
  schedule:
    - cron: "30 0 * * *" # 00:30 UTC (07:30 Bangkok Time)
  workflow_dispatch:

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install gspread google-auth requests

      - name: Fetch user stats
        env:
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          X_BEARER: ${{ secrets.X_BEARER }}
          X_COOKIE_STRING: ${{ secrets.X_COOKIE_STRING }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python stats.py
